<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">📋 CFH设计中心</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-hover: #242c38;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --tag-bg: rgba(88,166,255,0.12);
    --tag-text: #58a6ff;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
    --radius: 10px;
    --radius-sm: 6px;

    /* 职能 Tab 主题色 */
    --tab-ixd-color: #a259ff;
    --tab-ixd-bg: rgba(162,89,255,0.12);
    --tab-vis-color: #f24e1e;
    --tab-vis-bg: rgba(242,78,30,0.12);
    --tab-refactor-color: #00f2fe;
    --tab-refactor-bg: rgba(0,242,254,0.10);
    --tab-weekly-color: #ff7262;
    --tab-weekly-bg:rgba(255,114,98,0.12);
    --tab-weeklyreport-color: #2ea043;
    --tab-weeklyreport-bg: rgba(46,160,67,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* 居中容器 */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ===== Header ===== */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 20px 0 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header .container {
    display: block;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
    padding-bottom: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #a259ff, #f24e1e, #ff7262);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--text-secondary); }
  .update-time {
    font-size: 11px; color: var(--text-muted);
    margin-top: 2px;
  }

  /* Search */
  .header-right {
    display: flex; align-items: center; gap: 10px;
    flex: 1; justify-content: flex-end; max-width: 520px;
  }
  .search-bar { position: relative; width: 100%; flex-shrink: 1; }
  .search-input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px;
  }

  /* ===== 职能 Tab 导航栏（新增）===== */
  .nav-tabs {
    display: flex; gap: 4px;
    padding: 0 0 0; margin-top: 8px;
    border-bottom: 1px solid var(--border-color);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .nav-tabs::-webkit-scrollbar { height: 0; }
  .nav-tab {
    flex-shrink: 0;
    padding: 10px 22px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; border-bottom: 2px solid transparent;
    background: none; color: var(--text-secondary);
    transition: all 0.2s; position: relative;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .nav-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
  /* 各 Tab 激活态 — 用对应职能色 */
  .nav-tab.active-ixd {
    color: var(--tab-ixd-color);
    border-bottom-color: var(--tab-ixd-color);
  }
  .nav-tab.active-vis {
    color: var(--tab-vis-color);
    border-bottom-color: var(--tab-vis-color);
  }
  .nav-tab.active-refactor {
    color: var(--tab-refactor-color);
    border-bottom-color: var(--tab-refactor-color);
  }
  .nav-tab.active-weekly {
    color: var(--tab-weekly-color);
    border-bottom-color: var(--tab-weekly-color);
  }
  .nav-tab.active-weeklyreport {
    color: var(--tab-weeklyreport-color);
    border-bottom-color: var(--tab-weeklyreport-color);
  }

  /* Tab 角标数字 */
  .nav-tab .tab-count {
    font-size: 11px; font-weight: 700;
    margin-left: 6px;
    padding: 1px 7px; border-radius: 10px;
    vertical-align: middle;
  }
  .nav-tab.active-ixd .tab-count   { background: var(--tab-ixd-bg); color: var(--tab-ixd-color); }
  .nav-tab.active-vis .tab-count    { background: var(--tab-vis-bg); color: var(--tab-vis-color); }
  .nav-tab.active-refactor .tab-count{ background: var(--tab-refactor-bg); color: var(--tab-refactor-color); }
  .nav-tab.active-weekly .tab-count { background: var(--tab-weekly-bg); color: var(--tab-weekly-color); }
  .nav-tab.active-weeklyreport .tab-count { background: var(--tab-weeklyreport-bg); color: var(--tab-weeklyreport-color); }
  .nav-tab:not(.active-ixd):not(.active-vis):not(.active-refactor):not(.active-weekly):not(.active-weeklyreport) .tab-count {
    background: var(--bg-card); color: var(--text-muted);
  }

  /* Filter Tabs */
  .filter-section {
    padding: 20px 0 16px;
    display: flex; flex-direction: column; gap: 0;
  }
  .filter-label { font-size: 13px; color: var(--text-secondary); margin-right: 4px; }
  .filter-tab {
    padding: 5px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text-secondary);
    transition: all 0.15s;
  }
  .filter-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
  .filter-tab.active {
    background: var(--tag-bg); color: var(--tag-text);
    border-color: rgba(88,166,255,0.25);
  }
  /* 板块按钮稍微大一点，区分层级 */
  .section-tab { font-weight: 600; padding: 6px 18px; }
  .cat-tab { font-size: 12px; }

  /* 两行筛选垂直堆叠 */
  .filter-row-section {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
  }
  .filter-row-cat {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    min-height: 36px;
  }

  /* Main Content */
  .main { padding: 0 0 60px; }

  /* Section Group (板块分组) */
  .section-group { margin-bottom: 56px; }
  .section-title {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  /* Category Section */
  .category-section { margin-bottom: 16px; }
  .category-header {
    display: none;
  }
  .category-count {
    font-size: 13px; color: var(--text-muted);
    background: var(--bg-card); padding: 2px 10px; border-radius: 10px;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card-grid .grid-spacer {
    visibility: hidden;
  }

  /* Doc Card */
  .doc-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 8px 16px 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none; color: inherit;
    display: block; position: relative;
  }
  .doc-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  /* 新文档角标 */
  .new-badge {
    display: inline-block; margin-left: 6px;
    background: linear-gradient(135deg, #f0883e, #ff6b35);
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 1px 7px; border-radius: 8px;
    line-height: 1.4; vertical-align: middle;
    animation: pulse-badge 2s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  /* 已访问效果 */
  .doc-card.visited { opacity: 0.55; }
  .doc-card.visited:hover { opacity: 0.85; }
  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center;
  }

  .card-desc {
    font-size: 12px; color: var(--text-secondary);
    margin: 0;
    line-height: 1.3;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 0; }
  .card-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--tag-bg); color: var(--tag-text);
  }
  .card-tag.phase { background: rgba(137,87,229,0.12); color: #a371f7; }

  .card-meta {
    font-size: 11px; color: var(--text-muted);
    padding-top: 2px;
  }

  /* Footer */
  .footer {
    text-align: center; padding: 30px;
    color: var(--text-muted); font-size: 12px;
    border-top: 1px solid var(--border-color); margin-top: 40px;
  }

  /* No Results */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .no-results-icon { font-size: 48px; margin-bottom: 12px; }

  /* 空状态（Tab 无数据） */
  .empty-tab {
    text-align: center; padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-tab-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-tab h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
  .empty-tab p { font-size: 13px; }

  /* Loading */
  .loading {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
    font-size: 15px;
  }
  .loading-spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .doc-card { animation: fadeIn 0.3s ease-out forwards; }

  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    .header { padding: 16px 0 0; }
    .stats-row { padding: 16px 0; }
    .filter-section { padding: 0 0 12px; }
    .main { padding: 0 0 40px; }
    .card-grid { grid-template-columns: 1fr; }
    .nav-tab { padding: 8px 14px; font-size: 13px; }
  }

  /* ===== 编辑模式样式 ===== */
  .edit-btn {
    padding: 8px 18px; font-size: 14px; font-weight: 600;
    border: 1px solid var(--accent); border-radius: var(--radius-sm);
    background: rgba(88,166,255,0.1); color: var(--accent);
    cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    flex-shrink: 0; white-space: nowrap;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .edit-btn.active {
    background: rgba(88,166,255,0.12); color: var(--accent);
    border-color: var(--accent);
  }
  body.edit-mode .doc-card { cursor: grab; }
  body.edit-mode .doc-card:active { cursor: grabbing; }
  body.edit-mode .doc-card:hover { transform: none; box-shadow: none; }
  body.edit-mode .doc-card.dragging { opacity: 0.4; }
  body.edit-mode .card-grid { min-height: 50px; transition: background 0.15s; }
  body.edit-mode .section-group.drag-over-section > .section-title {
    color: var(--accent) !important; border-bottom-color: var(--accent) !important;
  }
  /* 卡片拖动手柄 + 分类选择 */
  body.edit-mode .doc-card { position: relative; padding-right: 44px; }
  body.edit-mode .card-drag-handle {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; cursor: grab;
    color: var(--text-muted); font-size: 18px; text-align: center; line-height: 36px;
    user-select: none; flex-shrink: 0; border-radius: var(--radius-sm); transition: all 0.2s;
  }
  body.edit-mode .card-drag-handle:hover { color: var(--accent); background: rgba(88,166,255,0.12); }
  body.edit-mode .card-drag-handle:active { cursor: grabbing; }
  body.edit-mode .card-inline-cat-select {
    position: absolute; right: 44px; top: 50%; transform: translateY(-50%);
    font-size: 13px; padding: 5px 8px; border-radius: 6px;
    border: 1px solid var(--border-color); background: var(--bg-card);
    color: #e0e0e0; cursor: pointer;
    transition: all 0.2s; min-width: 90px;
    max-width: 120px;
    z-index: 2;
  }
  body.edit-mode .card-inline-cat-select:focus { border-color: var(--accent); outline: none; background: rgba(88,166,255,0.06); color: #fff; }
  body.edit-mode .card-inline-cat-select option { background: #1e2233; color: #e8e8e8; padding: 4px 6px; }
  body.edit-mode .card-inline-cat-select option:checked, body.edit-mode .card-inline-cat-select option:hover { background: #2a3050; }
  .toolbar-btn-add-circle {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--accent); background: rgba(88,166,255,0.08);
    color: var(--accent); font-size: 20px; line-height: 28px;
    text-align: center; cursor: pointer; flex-shrink: 0;
    transition: all 0.2s; padding: 0; display: inline-flex; align-items: center; justify-content: center;
  }
  .toolbar-btn-add-circle:hover {
    background: rgba(88,166,255,0.2); transform: scale(1.1);
  }
  /* 鼠标跟随拖拽 - 实体嵌入 */
  .doc-card.drag-active {
    opacity: 0.25 !important; border-color: var(--accent) !important;
    transition: opacity 0.15s ease !important;
    cursor: grabbing !important;
  }
  .drag-ghost {
    opacity: 0.9; box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 25px rgba(88,166,255,0.35) !important;
    border: 2px solid var(--accent) !important; transform: scale(1.03) rotate(2deg);
    transition: none !important; pointer-events: none !important;
  }
  .doc-card.drag-target {
    border-color: transparent !important;
    box-shadow: none !important;
  }
  /* 拖拽插入位置竖线提示 */
  .drag-indicator {
    width: 100%; height: 3px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(88,166,255,0.6), 0 0 20px rgba(88,166,255,0.25);
    z-index: 100;
    pointer-events: none;
    flex-shrink: 0; margin: 2px 0;
    transition: opacity 0.15s;
  }
  .edit-toolbar {
    position: fixed; bottom: 30px; right: 40px; z-index: 999;
    display: flex; gap: 8px; align-items: center;
    background: var(--bg-secondary); border: 1px solid var(--border-color);
    border-radius: var(--radius); padding: 10px 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toolbar-btn {
    padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
  }
  .toolbar-btn-save { background: #238636; color: #fff; }
  .toolbar-btn-save:hover { background: #2ea043; }
  .toolbar-btn-cancel { background: var(--bg-primary); color: var(--text-secondary); border-color: var(--border-color); }
  .toolbar-btn-cancel:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .toolbar-btn-add { background: rgba(88,166,255,0.12); color: var(--accent); border-color: rgba(88,166,255,0.25); }
  .toolbar-btn-add:hover { background: rgba(88,166,255,0.2); }
  .toolbar-status { font-size: 12px; color: var(--text-muted); margin: 0 6px; }
  .save-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
    display: none; align-items: center; justify-content: center;
  }
  .save-overlay.show { display: flex; }
  .save-dialog {
    background: var(--bg-secondary); border: 1px solid var(--border-color);
    border-radius: var(--radius); padding: 28px 32px; max-width: 420px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .save-dialog h3 { font-size: 18px; margin-bottom: 16px; }
  .save-dialog p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .save-dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .save-dialog-actions button { padding: 8px 20px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .save-confirm { background: #238636; color: #fff; border: none; }
  .save-confirm:hover { background: #2ea043; }
  .save-cancel-btn { background: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border-color); }
  .save-cancel-btn:hover { color: var(--text-primary); }

  /* 分类管理 */
  body.edit-mode .section-title::after {
    content: ' ✏️'; font-size: 13px; margin-left: 8px; cursor: pointer; opacity: 0.5;
  }
  body.edit-mode .section-title:hover::after { opacity: 1; }
  .cat-inline-add {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; font-size: 12px; border-radius: 20px;
    border: 1px dashed var(--border-color); color: var(--text-muted);
    cursor: pointer; margin-left: 10px; vertical-align: middle;
  }
  .cat-inline-add:hover { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="container">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div>
        <div class="logo-text" id="logoTitle">CFH设计中心</div>
        <div class="logo-sub" id="logoSub">CFH Design Hub · 访客可编辑</div>
        <div class="update-time" id="updateTime"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-bar" style="flex:1;max-width:none;">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="搜索文档名称或标签..." oninput="renderAll()">
      </div>
      <button class="edit-btn" id="editToggleBtn" onclick="toggleEditMode()">
        ✏️ 编辑
      </button>
    </div>
  </div>

  <!-- 职能 Tab 导航 -->
  <nav class="nav-tabs" id="navTabs"></nav>
  </div>
</header>

<!-- Filters -->
<div class="filter-section container" id="filterSection"></div>

<!-- Main Content -->
<main class="main container" id="mainContent">
  <div class="loading"><span class="loading-spinner"></span>正在加载数据...</div>
</main>

<!-- Footer -->
<!-- Edit Toolbar (编辑模式时显示) -->
<div class="edit-toolbar" id="editToolbar" style="display:none;">
  <button class="toolbar-btn-add-circle" onclick="showAddCategoryDialog()" title="新增分类">+</button>
  <span class="toolbar-status" id="toolbarStatus">拖拽卡片排序</span>
  <button class="toolbar-btn toolbar-btn-cancel" onclick="cancelEdit()">取消</button>
  <button class="toolbar-btn toolbar-btn-save" onclick="showSaveDialog()">💾 保存发布</button>
</div>

<!-- Save Overlay -->
<div class="save-overlay" id="saveOverlay">
  <div class="save-dialog">
    <h3>📤 保存更改到 GitHub</h3>
    <p>将当前的分类调整、卡片顺序等改动保存到服务器，所有访客将看到更新后的内容。</p>
    <div class="save-dialog-actions">
      <button class="save-cancel-btn" onclick="hideSaveDialog()">取消</button>
      <button class="save-confirm" onclick="saveToGitHub()">确认保存</button>
    </div>
  </div>
</div>

<footer class="footer">
  <p id="footerText">📋 CFH设计中心 · 最后更新中...</p>
</footer>

<script src="doc-index/data.js?v=20260413"></script>
<script>
/**
 * ============================================================
 * 🎮 CFH 设计中心 - 多职能索引页
 * ============================================================
 * 支持多个职能 Tab：交互稿 / 视觉稿 / 重构落地 / 概念推导&周报
 * 每个 Tab 独立展示对应的文档集合
 */

// 调试：立即检查数据是否加载成功
window.__dataLoadError = null;
if (typeof DOC_DATA === 'undefined' && typeof INDEX_DATA === 'undefined') {
  window.__dataLoadError = 'data.js 未加载：DOC_DATA 和 INDEX_DATA 都不存在';
  console.error(window.__dataLoadError);
}

// ========== 职能定义 ==========
// 每个 Tab 对应 data.js 中的一套独立数据（通过 channel 字段区分）
var CHANNELS = [
  { key: 'ixd',       label: '✏️ 交互稿',     shortLabel: '交互稿',     colorClass: 'ixd',       icon: '✏️' },
  { key: 'weekly',    label: '💡 概念推导',    shortLabel: '概念推导',    colorClass: 'weekly',    icon: '💡' },
  { key: 'refactor',  label: '🔧 重构落地',    shortLabel: '重构落地',    colorClass: 'refactor',  icon: '🔧' },
  { key: 'report',    label: '📊 周报',        shortLabel: '周报',        colorClass: 'weeklyreport', icon: '📊' },
];

var activeChannel = 'ixd';   // 当前选中的职能 Tab
var activeCategory = 'all';
var activeSection = 'all';   // 板块筛选
var activeStatus = 'all';    // 状态筛选
var newDocSet = null;        // 随机标记"新"的文档 URL 集合
var appData = null;          // 当前职能的数据

// 板块 icon 映射（与 Tab icon 保持一致）
var SECTION_ICONS = {
  '局外': '🌐', '局内': '🏠', '主机相关': '🖥️', '通用': '⚙️'
};

// ========== 初始化 ==========
(function init() {
  try {
    if (typeof DOC_DATA === 'undefined' && typeof INDEX_DATA === 'undefined') {
      showError('⚠️ 数据文件加载失败，请确认 data.js 存在');
      return;
    }
    // 兼容旧格式：如果 DOC_DATA 是单对象，包装为多通道格式
    if (typeof DOC_DATA !== 'undefined' && !DOC_DATA.channels) {
      appData = { channels: {} };
      appData.channels['ixd'] = DOC_DATA;
      appData.channels['refactor'] = { title: 'CFH重构落地', subtitle: '', documents: [], updatedAt: '' };
      appData.channels['concept']   = { title: 'CFH概念推导', subtitle: '', documents: [], updatedAt: '' };
      appData.channels['weekly']    = { title: 'CFH周报',     subtitle: '', documents: [], updatedAt: '' };
    } else if (typeof INDEX_DATA !== 'undefined' && !INDEX_DATA.channels) {
      appData = { channels: {} };
      appData.channels['ixd'] = INDEX_DATA;
      appData.channels['refactor'] = { title: 'CFH重构落地', subtitle: '', documents: [], updatedAt: '' };
      appData.channels['concept']   = { title: 'CFH概念推导', subtitle: '', documents: [], updatedAt: '' };
      appData.channels['weekly']    = { title: 'CFH周报',     subtitle: '', documents: [], updatedAt: '' };
    } else {
      appData = typeof DOC_DATA !== 'undefined' ? DOC_DATA : INDEX_DATA;
      // 将 weekly 数据拆分为「概念推导」+「周报」两个独立 channel
      if (appData.channels && appData.channels['weekly']) {
        var srcWeekly = appData.channels['weekly'];
        var cDocs = [], rDocs = [];
        for (var si = 0; si < (srcWeekly.documents || []).length; si++) {
          var sd = srcWeekly.documents[si];
          var sn = sd.name || '';
          // 概念推导判定：名称含"推导"/"概念"/"KOTO"/"PARKI"/"体验优化"/"世界观主流程"/"口味FIGMA"/"风格测试"/"PC主机"
          if (sn.indexOf('推导') >= 0 || sn.indexOf('概念') >= 0 ||
              sn.indexOf('KOTO') >= 0 || sn.indexOf('PARKI') >= 0 || sn.indexOf('PC主机') >= 0 ||
              sn.indexOf('体验优化') >= 0 || sn.indexOf('世界观主流程') >= 0 ||
              sn.indexOf('口味FIGMA') >= 0 || sn.indexOf('风格测试') >= 0) { cDocs.push(sd); }
          else { rDocs.push(sd); }
        }
        appData.channels['weekly'] = {
          title: 'CFH概念推导 & 周报',
          subtitle: srcWeekly.subtitle || '',
          documents: cDocs,
          updatedAt: srcWeekly.updatedAt || ''
        };
        appData.channels['report'] = {
          title: 'CFH设计周报',
          subtitle: '',
          documents: rDocs,
          updatedAt: srcWeekly.updatedAt || ''
        };
      }
    }

    renderNavTabs();
    switchChannel('ixd');
    
    // 更新底部时间
    var latest = '';
    if (appData.channels) {
      for (var ck in appData.channels) {
        var cu = (appData.channels[ck] || {}).updatedAt;
        if (cu && (!latest || cu > latest)) latest = cu;
      }
    }
    var ft = document.getElementById('footerText');
    if (ft) ft.textContent = '📋 CFH设计中心 · 最后更新: ' + (latest || new Date().toLocaleDateString('zh-CN'));
    
    // 隐藏 loading
    var loadingEl = document.querySelector('.loading');
    if (loadingEl) loadingEl.style.display = 'none';
  } catch(e) {
    showError('❌ 页面初始化失败: ' + e.message);
  }
})();

// ========== 渲染职能导航 Tab ==========
function renderNavTabs() {
  var html = '';
  for (var i = 0; i < CHANNELS.length; i++) {
    var ch = CHANNELS[i];
    var chData = (appData.channels && appData.channels[ch.key]) || {};
    var docs = chData.documents || [];
    var count = docs.length;
    var activeCls = activeChannel === ch.key ? ' active-' + ch.colorClass : '';
    html += '<button class="nav-tab' + activeCls + '" onclick="switchChannel(\'' + ch.key + '\')">' +
            ch.label + '<span class="tab-count">' + count + '</span></button>';
  }
  document.getElementById('navTabs').innerHTML = html;
}

// ========== 切换职能 Tab ==========
function switchChannel(channelKey) {
  activeChannel = channelKey;
  activeCategory = 'all';
  activeSection = 'all';
  activeStatus = 'all';

  // 更新 Tab 高亮
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = 'nav-tab';
  }
  // 重新渲染 Tab 以更新高亮和计数
  renderNavTabs();

  // 获取当前通道的数据（使用已初始化的 appData，不要重新从 DOC_DATA 覆盖）
  if (!appData || !appData.channels) return;
  var chData = appData.channels[channelKey] || { documents: [] };

  // 设置新文档标记集
  var docs = chData.documents || [];
  var urls = docs.map(function(d) { return d.url || d.name; });
  var shuffled = urls.slice().sort(function() { return Math.random() - 0.5; });
  var pickCount = Math.min(Math.max(4, Math.floor(docs.length * 0.1)), 8);
  newDocSet = {};
  for (var j = 0; j < pickCount && j < shuffled.length; j++) {
    newDocSet[shuffled[j]] = true;
  }

  renderAll();
}

// ========== 主渲染函数 ==========
function renderAll() {
  // 使用已初始化的 appData（不要重新从原始数据读取）
  if (!appData || !appData.channels) return;
  var chData = appData.channels[activeChannel] || {};
  var docs = chData.documents || [];

  // 周报按时间排序（最新的在最前面），新人周报/视觉周报置底
  if (activeChannel === 'weekly' && docs.length > 0) {
    docs = docs.slice().sort(function(a, b) {
      var na = (a.name || ''), nb = (b.name || '');
      var aIsBottom = (na.indexOf('新人') >= 0 || na.indexOf('视觉') >= 0) ? 1 : 0;
      var bIsBottom = (nb.indexOf('新人') >= 0 || nb.indexOf('视觉') >= 0) ? 1 : 0;
      if (aIsBottom !== bIsBottom) return aIsBottom - bIsBottom;  // 置底的排后面
      var ta = a.updatedAt || a.lastUpdated || '';
      var tb = b.updatedAt || b.lastUpdated || '';
      return ta < tb ? 1 : (ta > tb ? -1 : 0);
    });
  }

  var keyword = document.getElementById('searchInput').value.toLowerCase().trim();

  // 更新全局信息
  var chInfo = CHANNELS.find(function(c) { return c.key === activeChannel; });
  var chLabel = chInfo ? chInfo.shortLabel : '文档';
  document.getElementById('pageTitle').textContent = '🎮 CFH设计中心 · ' + chLabel;
  document.getElementById('logoTitle').textContent = 'CFH设计中心';
  document.getElementById('logoSub').textContent = (chInfo ? chInfo.label : '') + (chData.subtitle ? ' · ' + chData.subtitle : '');
  // 显示最后更新日期
  var updateTimeEl = document.getElementById('updateTime');
  if (updateTimeEl) {
    updateTimeEl.textContent = '🕐 最后更新: ' + (chData.updatedAt || chData.lastUpdated || new Date().toLocaleDateString('zh-CN'));
  }
  var chInfo = CHANNELS.find(function(c) { return c.key === activeChannel; });
  // 如果该 Tab 完全没有数据，显示空状态
  if (docs.length === 0) {
    renderEmptyTab(chInfo);
    document.getElementById('filterSection').innerHTML = '';
    return;
  }


  // 概念推导：隐藏筛选，分为「概念推导」「世界观元素」两个板块
  if (activeChannel === 'weekly') {
    document.getElementById('filterSection').innerHTML = '';

    var conceptDocs = [];   // 概念推导类
    var worldDocs = [];     // 周报/汇报类
    for (var ci = 0; ci < docs.length; ci++) {
      var cd = docs[ci];
      var name = cd.name || '';
      // 同 init() 的拆分规则
      if (name.indexOf('推导') >= 0 || name.indexOf('概念') >= 0 ||
          name.indexOf('KOTO') >= 0 || name.indexOf('PARKI') >= 0 || name.indexOf('PC主机') >= 0 ||
          name.indexOf('体验优化') >= 0 || name.indexOf('世界观主流程') >= 0 ||
          name.indexOf('口味FIGMA') >= 0 || name.indexOf('风格测试') >= 0) {
        conceptDocs.push(cd);
      } else {
        worldDocs.push(cd);
      }
    }

    // 搜索过滤
    if (keyword) {
      conceptDocs = conceptDocs.filter(function(d) { return ((d.name||'')+' '+(d.tags||[]).join(' ')+' '+(d.desc||'')).toLowerCase().indexOf(keyword)!==-1; });
      worldDocs = worldDocs.filter(function(d) { return ((d.name||'')+' '+(d.tags||[]).join(' ')+' '+(d.desc||'')).toLowerCase().indexOf(keyword)!==-1; });
    }

    var container = document.getElementById('mainContent');
    var html = '';

    // 板块1: 💡 概念推导
    if (conceptDocs.length > 0) {
      html += '<section class="section-group"><h2 class="section-title">💡 概念推导</h2><div class="card-grid">';
      for (var i = 0; i < conceptDocs.length; i++) html += renderCard(conceptDocs[i], i);
      html += '</div></section>';
    }
    // 板块2: 🌐 世界观元素
    if (worldDocs.length > 0) {
      html += '<section class="section-group"><h2 class="section-title">🌐 世界观元素</h2><div class="card-grid">';
      for (var j = 0; j < worldDocs.length; j++) html += renderCard(worldDocs[j], j);
      html += '</div></section>';
    }

    container.innerHTML = html;
    setTimeout(function() { fillGridGaps(container); }, 0);
    return;
  }

  // 重构落地：隐藏筛选，平铺展示
  if (activeChannel === 'refactor') {
    document.getElementById('filterSection').innerHTML = '';

    var container = document.getElementById('mainContent');
    var rHtml = '<div class="card-grid">';

    // 搜索过滤
    var refDocs = keyword ? docs.filter(function(d) { return (d.name||'').toLowerCase().indexOf(keyword)!==-1; }) : docs;
    for (var ri3 = 0; ri3 < refDocs.length; ri3++) rHtml += renderCard(refDocs[ri3], ri3);
    
    rHtml += '</div>';
    container.innerHTML = rHtml || '<div class="no-results"><div class="no-results-icon">🔍</div><p>暂无重构落地数据</p></div>';
    setTimeout(function() { fillGridGaps(container); }, 0);
    return;
  }
  if (activeChannel === 'report') {
    document.getElementById('filterSection').innerHTML = '';

    var yearGroups = {};
    for (var ri = 0; ri < docs.length; ri++) {
      var rd = docs[ri];
      var year = '模板';
      var ym = rd.name.match(/(20\d{2})/);
      if (ym) year = ym[1];
      else if (rd.updatedAt) {
        var dym = rd.updatedAt.match(/(20\d{2})/);
        if (dym) year = dym[1];
      }
      if (!yearGroups[year]) yearGroups[year] = [];
      yearGroups[year].push(rd);
    }

    // 搜索过滤
    if (keyword) {
      Object.keys(yearGroups).forEach(function(yk) {
        yearGroups[yk] = yearGroups[yk].filter(function(d) { return ((d.name||'')+' '+(d.tags||[]).join(' ')+' '+(d.desc||'')).toLowerCase().indexOf(keyword)!==-1; });
      });
    }

    var container = document.getElementById('mainContent');
    var rHtml = '';
    var sortedYears = Object.keys(yearGroups).sort().reverse();
    for (var ryi = 0; ryi < sortedYears.length; ryi++) {
      var ry = sortedYears[ryi];
      var rDocs = yearGroups[ry];
      if (rDocs.length === 0) continue;
      rHtml += '<section class="section-group"><h2 class="section-title">📅 ' + escapeHtml(ry) + '年</h2><div class="card-grid">';
      for (var ri2 = 0; ri2 < rDocs.length; ri2++) rHtml += renderCard(rDocs[ri2], ri2);
      rHtml += '</div></section>';
    }
    container.innerHTML = rHtml || '<div class="no-results"><div class="no-results-icon">🔍</div><p>暂无周报数据</p></div>';
    setTimeout(function() { fillGridGaps(container); }, 0);
    return;
  }

  // 按 categoryKey 分组（交互稿/重构落地等 Tab）
  var grouped = {};
  for (var i = 0; i < docs.length; i++) {
    var d = docs[i];
    var catKey = (d.categoryKey || 'other').toLowerCase();
    if (!grouped[catKey]) grouped[catKey] = [];
    grouped[catKey].push(d);
  }

  // 筛选
  var filteredDocs = [];
  var filteredGrouped = {};
  Object.keys(grouped).forEach(function(catKey) {
    var catDocs = grouped[catKey];
    var firstDoc = catDocs[0] || null;
    if (!firstDoc) return;
    var docSec = (firstDoc.section || '其他');

    // 板块过滤
    if (activeSection !== 'all' && docSec !== activeSection) return;

    var matched = catDocs.filter(function(d) {
      if (activeCategory !== 'all' && (d.categoryKey || 'other').toLowerCase() !== activeCategory) return false;
      if (keyword) {
        var haystack = (d.name || '') + ' ' + (d.tags || []).join(' ') + ' ' + (d.desc || '');
        if (haystack.toLowerCase().indexOf(keyword) === -1) return false;
      }
      return true;
    });
    if (matched.length > 0) {
      filteredGrouped[catKey] = { category: matched[0].category || catKey, docs: matched };
      filteredDocs = filteredDocs.concat(matched);
    }
  });

  // 渲染各部分
  renderFilters(grouped);
  renderContent(filteredGrouped, filteredDocs.length === 0 && keyword);
}

// ========== 卡片网格自动补位（消除最后一行空缺）==========
function fillGridGaps(container) {
  if (!container) return;
  var grids = container.querySelectorAll('.card-grid');
  for (var gi = 0; gi < grids.length; gi++) {
    var grid = grids[gi];
    if (!grid.children || grid.children.length === 0) continue;
    // 获取当前列数（从第一行的卡片宽度计算）
    var firstCard = grid.children[0];
    var gridWidth = grid.offsetWidth;
    var cardWidth = firstCard.offsetWidth;
    var gap = 16;
    // 计算列数：容器宽度 / (卡片宽度 + gap) 向下取整
    var cols = Math.max(1, Math.round((gridWidth + gap) / (cardWidth + gap)));
    // 如果是 auto-fill 且窗口宽度变化，cols 可能不准，保守取 3
    if (cols > 6) cols = 3; // fallback
    var remainder = grid.children.length % cols;
    if (remainder !== 0) {
      for (var s = remainder; s < cols; s++) {
        var sp = document.createElement('div');
        sp.className = 'doc-card grid-spacer';
        grid.appendChild(sp);
      }
    }
  }
}

// ========== 周报专用渲染（按年份分组）==========
function renderContentWeekly(yearGrouped) {
  var container = document.getElementById('mainContent');

  var sortedYears = Object.keys(yearGrouped).sort().reverse();

  if (sortedYears.length === 0) {
    container.innerHTML =
      '<div class="no-results">' +
        '<div class="no-results-icon">🔍</div>' +
        '<p>没有找到匹配的周报</p></div>';
    return;
  }

  var html = '';
  for (var yi = 0; yi < sortedYears.length; yi++) {
    var catKey = sortedYears[yi];
    var catInfo = yearGrouped[catKey];
    var yearTitle = catInfo.category;
    var catDocs = catInfo.docs;

    html += '<section class="section-group">';
    if (yearTitle) {
      var titlePrefix = /^[\p{Emoji_Presentation}\p{Extended_Pictographic}]/u.test(yearTitle) ? '' : '📅 ';
      html += '<h2 class="section-title">' + titlePrefix + escapeHtml(yearTitle) + '</h2>';
    }
    html += '<div class="card-grid">';
    for (var di = 0; di < catDocs.length; di++) {
      html += renderCard(catDocs[di], di);
    }
    html += '</div></section>';
  }
  container.innerHTML = html;
  // 自动补位（等 DOM 渲染后计算）
  setTimeout(function() { fillGridGaps(container); }, 0);
}

// ========== 空状态（某 Tab 无数据时）==========
function renderEmptyTab(chInfo) {
  var container = document.getElementById('mainContent');
  var iconName = chInfo ? chInfo.icon : '📭';
  var tabName = chInfo ? chInfo.label : '此分类';
  container.innerHTML =
    '<div class="empty-tab">' +
      '<div class="empty-tab-icon">' + iconName + '</div>' +
      '<h3>' + escapeHtml(tabName) + ' 整理中…</h3>' +
      '<p>该分类暂无内容，敬请期待！<br>后续会陆续添加相关文档。</p>' +
    '</div>';
}

// ========== 分类筛选标签（板块 + 子分类两层）==========
function renderFilters(grouped) {
  var sections = {};

  Object.keys(grouped).forEach(function(catKey) {
    var catInfo = grouped[catKey];
    var doc = Array.isArray(catInfo) ? catInfo[0] : (catInfo.docs && catInfo.docs.length ? catInfo.docs[0] : null);
    if (!doc) return;
    var sec = doc.section || '其他';
    var catName = catInfo.category || doc.category || catKey;
    var count = Array.isArray(catInfo) ? catInfo.length : (catInfo.docs ? catInfo.docs.length : 0);

    if (!sections[sec]) sections[sec] = { total: 0, cats: [] };
    sections[sec].total += count;
    sections[sec].cats.push({ key: catKey, name: catName, count: count, sectionOrder: doc.sectionOrder || 99 });
  });

  var sectionOrder = ['局外', '局内', '主机相关', '通用', '推导&周报', '重构跟踪', '其他'];
  var sortedSections = Object.keys(sections).sort(function(a, b) {
    var ai = sectionOrder.indexOf(a), bi = sectionOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  // 第一行：板块按钮
  var sectionHtml = '<button class="filter-tab section-tab' + (activeSection === 'all' ? ' active' : '') +
                 '" onclick="setSection(this, \'all\')">📋 全部</button>';

  for (var si = 0; si < sortedSections.length; si++) {
    var secName = sortedSections[si];
    var secData = sections[secName];
    sectionHtml += '<button class="filter-tab section-tab' + (activeSection === secName ? ' active' : '') +
                   '" onclick="setSection(this, \'' + escapeHtml(secName) + '\')">' +
                   '📂 ' + escapeHtml(secName) + ' (' + secData.total + ')</button>';
  }

  // 第二行：子分类标签
  var categoryHtml = '';
  categoryHtml += '<button class="filter-tab cat-tab' + (activeCategory === 'all' ? ' active' : '') + '" onclick="setFilter(this, \'all\')">全部</button>';

  var showCats = (activeSection === 'all')
    ? sortedSections.map(function(s) { return sections[s].cats; }).reduce(function(a, b) { return a.concat(b); }, [])
    : (sections[activeSection] ? sections[activeSection].cats : []);

  showCats.sort(function(a, b) { return (a.sectionOrder || 0) - (b.sectionOrder || 0); });
  for (var i = 0; i < showCats.length; i++) {
    var c = showCats[i];
    categoryHtml += '<button class="filter-tab cat-tab' + (activeCategory === c.key ? ' active' : '') +
                    '" onclick="setFilter(this,\'' + c.key + '\')">📦 ' + c.name + ' (' + c.count + ')</button>';
  }

  document.getElementById('filterSection').innerHTML =
    '<div class="filter-row-section">' + sectionHtml + '</div>' +
    '<div class="filter-row-cat">' + categoryHtml + '</div>';
}

// 设置板块筛选
function setSection(btn, section) {
  document.querySelectorAll('.section-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  activeSection = section;
  activeCategory = 'all';
  renderAll();
}

// ========== 内容区域（按板块分组渲染）==========
function renderContent(grouped, showNoResults) {
  var container = document.getElementById('mainContent');

  if (showNoResults) {
    container.innerHTML =
      '<div class="no-results">' +
        '<div class="no-results-icon">🔍</div>' +
        '<p>没有找到匹配的文档</p>' +
        '<p style="font-size:13px;margin-top:4px;color:var(--text-muted);">试试其他关键词</p>' +
      '</div>';
    return;
  }

  // 按 section 分组
  var sections = {};
  Object.keys(grouped).forEach(function(catKey) {
    var catInfo = grouped[catKey];
    if (!catInfo || !catInfo.docs) return;
    var doc = catInfo.docs.length ? catInfo.docs[0] : null;
    if (!doc) return;
    var sec = doc.section || '其他';
    if (!sections[sec]) sections[sec] = { docs: {}, order: doc.sectionOrder || 99 };
    sections[sec].docs[catKey] = catInfo;
  });

  var sectionOrder = ['局外', '局内', '主机相关', '通用'];
  var sortedSecs = Object.keys(sections).sort(function(a, b) {
    var ai = sectionOrder.indexOf(a), bi = sectionOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  var html = '';

  for (var si = 0; si < sortedSecs.length; si++) {
    var secName = sortedSecs[si];
    var secData = sections[secName];

    html += '<section class="section-group">';
    var secIcon = SECTION_ICONS[secName] || '📁';
    html += '<h2 class="section-title">' + secIcon + ' ' + escapeHtml(secName) + '</h2>';

    // 分类排序：推导&周报板块用自定义顺序，其他板块按 sectionOrder 排序
    var catKeys = Object.keys(secData.docs);
    var catOrderMap = {
      '推导&周报': ['概念推导', '视觉推导', '周报']
    };
    var secCatOrder = catOrderMap[secName] || null;
    if (secCatOrder) {
      catKeys.sort(function(a, b) {
        var catA = (grouped[a] || {}).category || a;
        var catB = (grouped[b] || {}).category || b;
        var ai = secCatOrder.indexOf(catA), bi = secCatOrder.indexOf(catB);
        if (ai !== -1 && bi !== -1) return ai - bi;
        if (ai !== -1) return -1;
        if (bi !== -1) return 1;
        return catA.localeCompare(catB);
      });
    } else {
      catKeys.sort(function(a, b) {
        var docA = (secData.docs[a] || {}).docs ? (secData.docs[a].docs[0]||{}) : {};
        var docB = (secData.docs[b] || {}).docs ? (secData.docs[b].docs[0]||{}) : {};
        return (docA.sectionOrder || 99) - (docB.sectionOrder || 99);
      });
    }
    for (var ci = 0; ci < catKeys.length; ci++) {
      var catKey = catKeys[ci];
      var catInfo = grouped[catKey];
      var catName = catInfo.category || catKey;
      var catDocs = catInfo.docs;

      html += '<div class="category-section" data-category="' + catKey + '">' +
        '<div class="category-header">' +
          '<span class="category-title">' + secIcon + ' ' + escapeHtml(catName) + '</span>' +
          '<span class="category-count">' + catDocs.length + '</span>' +
        '</div>' +
        '<div class="card-grid">';

      for (var di = 0; di < catDocs.length; di++) {
        html += renderCard(catDocs[di], di);
      }

      html += '</div></div>';
    }
    html += '</section>';
  }

  container.innerHTML = html;
}

// ========== 单个卡片 ==========
function renderCard(doc, index) {
  var isNew = newDocSet && !!(newDocSet[doc.url] || newDocSet[doc.name]);
  var newBadge = isNew ? '<span class="new-badge">新</span>' : '';
  var updatedHtml = doc.updatedAt ? '<span>更新于 ' + doc.updatedAt + '</span>' : '';

  var visitedKey = 'visited_' + (doc.url || doc.name);
  var isVisited = sessionStorage.getItem(visitedKey) === '1';
  var visitedCls = isVisited ? ' visited' : '';

  var tagsHtml = '';
  if (doc.tags && doc.tags.length > 0) {
    tagsHtml = '<div class="card-tags">';
    for (var ti = 0; ti < doc.tags.length; ti++) {
      var tag = doc.tags[ti];
      var isPhase = /^v?\d/.test(tag);
      tagsHtml += '<span class="card-tag' + (isPhase ? ' phase' : '') + '">' + escapeHtml(tag) + '</span>';
    }
    tagsHtml += '</div>';
  } else {
    tagsHtml = '<div class="card-tags"></div>';
  }

  var displayName = doc.name.replace(/^\s*【[^】]+】\s*/, '');
  var catKey = (doc.categoryKey || '').toLowerCase();

  // 编辑模式额外元素
  var editExtra = '';
  var catSelectHtml = '';
  if (isEditMode) {
    editExtra = '<div class="card-drag-handle" title="拖拽排序">⠿</div>' +
      '<select class="card-inline-cat-select" onchange="changeCardCategoryInline(\'' + escapeHtml(doc.url) + '\', this.value, this)" title="切换分类">' +
      getCatOptionsForCard(catKey) +
      '</select>';
  }

  return '<a class="doc-card' + visitedCls + '" href="' + (isEditMode ? '#' : escapeHtml(doc.url || '#')) + '"' + (isEditMode ? '' : ' target="_blank" rel="noopener"') +
    ' style="animation-delay:' + (index * 0.03) + 's"' +
    ' data-visit-key="' + escapeHtml(visitedKey) + '"' +
    ' data-doc-url="' + escapeHtml(doc.url || '') + '"' +
    ' onclick="markVisited(this);return false;">' +
    editExtra +
    '<div class="card-top">' +
      '<span class="card-title">' + escapeHtml(displayName) + newBadge + '</span>' +
    '</div>' +
    '<div class="card-desc">' + escapeHtml(doc.desc || '') + '</div>' +
    tagsHtml +
    '<div class="card-meta">' + updatedHtml + '</div>' +
    '</a>';
}

// 标记为已访问（sessionStorage：刷新页面后自动重置）
function markVisited(el) {
  var key = el.getAttribute('data-visit-key');
  if (key) sessionStorage.setItem(key, '1');
  var href = el.getAttribute('href');
  if (href && href !== '#') {
    window.open(href, '_blank');
    return false;
  }
}

// ========== 编辑模式功能 ==========
var isEditMode = false;
var editOriginalDocs = null; // 进入编辑时备份原始数据

function toggleEditMode() {
  isEditMode = !isEditMode;
  var btn = document.getElementById('editToggleBtn');
  var toolbar = document.getElementById('editToolbar');
  if (isEditMode) {
    btn.className = 'edit-btn active'; btn.textContent = '👁️ 预览';
    toolbar.style.display = 'flex';
    document.body.classList.add('edit-mode');
    // 备份当前数据
    editOriginalDocs = JSON.stringify(appData.channels[activeChannel].documents);
    renderAll();
    // 绑定拖拽事件
    setTimeout(bindDragEvents, 100);
  } else {
    btn.className = 'edit-btn'; btn.textContent = '✏️ 编辑';
    toolbar.style.display = 'none';
    document.body.classList.remove('edit-mode');
    renderAll();
  }
}

function cancelEdit() {
  if (editOriginalDocs && !confirm('确定放弃所有修改？')) return;
  isEditMode = false;
  var btn = document.getElementById('editToggleBtn'); btn.className = 'edit-btn'; btn.textContent = '✏️ 编辑';
  document.getElementById('editToolbar').style.display = 'none';
  document.body.classList.remove('edit-mode');
  // 恢复原始数据
  if (editOriginalDocs) appData.channels[activeChannel].documents = JSON.parse(editOriginalDocs);
  editOriginalDocs = null;
  renderAll();
}

// ---------- 鼠标跟随式拖拽（实体嵌入）—— 事件委托版 ----------
var _ghost = null;       // 拖拽中的 ghost 副本
var _dragEl = null;      // 当前拖拽的原卡片
var _lastTarget = null;  // 上一个高亮的目标卡片
var _indicator = null;    // 竖线指示器元素
var _dragBound = false;  // 是否已绑定全局 move/up（防重复）

// 卡片内分类下拉选项
function getCatOptionsForCard(currentCatKey) {
  var cats = [];
  var seen = {};
  var docs = appData.channels[activeChannel].documents;
  for (var i = 0; i < docs.length; i++) {
    var c = (docs[i].category || '').trim();
    if (c && !seen[c]) { seen[c] = true; cats.push(c); }
  }
  cats.sort();
  var html = '';
  for (var j = 0; j < cats.length; j++) {
    var sel = (cats[j] === currentCatKey) ? ' selected' : '';
    html += '<option value="' + cats[j] + '"' + sel + '>' + cats[j] + '</option>';
  }
  return html;
}

// 卡片内分类切换（不触发重新渲染）
function changeCardCategoryInline(docUrl, newCat, selectEl) {
  var docs = appData.channels[activeChannel].documents;
  for (var i = 0; i < docs.length; i++) {
    if (docs[i].url === docUrl) {
      docs[i].category = newCat;
      break;
    }
  }
  // 标记为有修改
  window._hasUnsavedChanges = true;
}

// 一次性绑定 document 级别的事件委托（只绑定一次，不随 DOM 重建丢失）
function bindDragEvents() {
  if (_dragBound) return; // 已绑定过，跳过
  _dragBound = true;

  document.addEventListener('mousedown', function(e) {
    if (!isEditMode || e.button !== 0) return;
    var handle = e.target.closest('.card-drag-handle');
    var card = handle ? handle.closest('.doc-card') : null;
    if (!card) return;
    e.preventDefault();
    e.stopPropagation();
    startEmbedDrag(card, e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', function(e) {
    if (!_ghost && !_dragEl) return; // 不在拖拽中，忽略（性能优化）
    onEmbedMouseMove(e);
  });

  document.addEventListener('mouseup', function(e) {
    if (!_dragEl) return; // 不在拖拽中，忽略
    onEmbedMouseUp(e);
  });
}

// ===== 实体嵌入拖拽系统 =====
function startEmbedDrag(card, x, y) {
  var rect = card.getBoundingClientRect();

  // 创建跟随鼠标的 ghost 副本（不是原卡片）
  _ghost = card.cloneNode(true);
  _ghost.className = 'doc-card drag-ghost';
  _ghost.id = '';
  _ghost.style.position = 'fixed';
  _ghost.style.zIndex = '10000';
  _ghost.style.pointerEvents = 'none';
  _ghost.style.margin = '0';
  _ghost.style.width = rect.width + 'px';
  _ghost.style.left = (x - rect.width * 0.15) + 'px';
  _ghost.style.top = (y - 10) + 'px';
  document.body.appendChild(_ghost);

  // 原卡片变半透明留在原位
  _dragEl = card;
  _dragEl.classList.add('drag-active');
  _dragEl.style.opacity = '0.25';
}

function onEmbedMouseMove(e) {
  if (!_ghost || !_dragEl) return;
  e.preventDefault();

  // Ghost 跟随鼠标
  _ghost.style.left = (e.clientX + 15) + 'px';
  _ghost.style.top = (e.clientY - 8) + 'px';

  // 隐藏 ghost 找下方元素
  _ghost.style.pointerEvents = 'none';
  var below = document.elementFromPoint(e.clientX, e.clientY);
  _ghost.style.pointerEvents = 'auto';

  if (!below || !below.closest('#mainContent')) return;

  // 支持跨模块拖拽：找任何卡片或 section 标题区域
  var targetCard = below.closest('.doc-card:not(.drag-active)');
  
  // 如果没有找到卡片，尝试找 card-grid 容器（空分类区域）
  if (!targetCard) {
    var gridArea = below.closest('.card-grid');
    if (gridArea) {
      // 空容器，直接插入到末尾
      if (_dragEl.parentNode !== gridArea) gridArea.appendChild(_dragEl);
    }
    return;
  }

  if (targetCard === _dragEl) return;

  // 判断插入方向
  var tR = targetCard.getBoundingClientRect();
  var insertBefore = (e.clientY < tR.top + tR.height / 2);

  // 移动原卡片到目标位置（支持跨 card-grid，即跨模块）
  var parentGrid = targetCard.parentNode;
  if (_dragEl.parentNode !== parentGrid ||
      (insertBefore && _dragEl.previousSibling !== targetCard) ||
      (!insertBefore && _dragEl.nextSibling !== targetCard)) {
    if (insertBefore) {
      parentGrid.insertBefore(_dragEl, targetCard);
    } else {
      parentGrid.insertBefore(_dragEl, targetCard.nextSibling);
    }

    // 更新竖线位置（插入到目标卡片旁边）
    removeDragIndicator();
    _indicator = document.createElement('div');
    _indicator.className = 'drag-indicator';
    if (insertBefore) {
      parentGrid.insertBefore(_indicator, targetCard);
    } else {
      parentGrid.insertBefore(_indicator, targetCard.nextSibling);
    }
    _lastTarget = targetCard;
  }
}

function removeDragIndicator() {
  if (_indicator && _indicator.parentNode) { _indicator.remove(); }
  _indicator = null;
  _lastTarget = null;
}

function onEmbedMouseUp(e) {
  if (!_dragEl) return;

  // 移除 ghost
  if (_ghost && _ghost.parentNode) { _ghost.remove(); }
  _ghost = null;

  // 恢复原卡片样式
  _dragEl.classList.remove('drag-active');
  _dragEl.style.opacity = '';
  
  removeDragIndicator();

  updateDocOrderFromDOM();
  _dragEl = null;
}

// 从 DOM 更新 documents 数组顺序 + 跨分类移动
function updateDocOrderFromDOM() {
  var chData = appData.channels[activeChannel];
  var seenUrls = {};
  document.querySelectorAll('.card-grid').forEach(function(grid) {
    // 从 section-title 的 data-cat 获取目标分类
    var catKey = '';
    var titleEl = grid.previousElementSibling;
    while(titleEl && !titleEl.classList.contains('section-title')) {
      titleEl = titleEl.previousElementSibling;
    }
    if(titleEl) catKey = titleEl.getAttribute('data-cat') || '';

    grid.querySelectorAll('.doc-card').forEach(function(card) {
      var url = card.getAttribute('data-doc-url') || '';
      if (!url || seenUrls[url]) return;
      seenUrls[url] = true;

      // 找到对应文档并更新
      for(var di=0;di<chData.documents.length;di++) {
        if(chData.documents[di].url === url) {
          // 如果分类变了，更新 tags 中的分类
          if(catKey) {
            var doc = chData.documents[di];
            var cats = doc.categories || [];
            if(cats.indexOf(catKey)===-1 && cats.length>0) {
              // 替换第一个分类为新分类（简化处理）
              cats[0] = catKey;
              doc.category = catKey;
              doc.categories = cats;
            } else if(cats.length===0){
              doc.category = catKey;
              doc.categories=[catKey];
            }
          }
          break;
        }
      }
    });
  });

  // 按当前 DOM 顺序重排 documents
  var urlMap = {};
  chData.documents.forEach(function(d) { urlMap[d.url] = d; });
  var reordered = [];
  document.querySelectorAll('.card-grid').forEach(function(grid) {
    grid.querySelectorAll('.doc-card').forEach(function(card) {
      var url = card.getAttribute('data-doc-url')||'';
      if(urlMap[url]) reordered.push(urlMap[url]);
      delete urlMap[url];
    });
  });
  Object.values(urlMap).forEach(function(d){reordered.push(d);});
  chData.documents = reordered;
}

// ---------- 分类选择器 ----------
function changeCardCategory(docUrl, newCatKey) {
  var docs = appData.channels[activeChannel].documents;
  for (var i = 0; i < docs.length; i++) {
    if (docs[i].url === docUrl) {
      // 找新分类的名称和 section
      var catInfo = findCategoryInfo(newCatKey);
      if (catInfo) {
        docs[i].category = catInfo.name;
        docs[i].categoryKey = newCatKey;
        docs[i].section = catInfo.section;
        docs[i].sectionOrder = catInfo.sectionOrder;
      } else {
        // 新分类 key，直接设值
        docs[i].category = newCatKey;
        docs[i].categoryKey = newCatKey;
      }
      break;
    }
  }
  renderAll();
  setTimeout(bindDragEvents, 100);
}

function findCategoryInfo(catKey) {
  var docs = appData.channels[activeChannel].documents;
  for (var i = 0; i < docs.length; i++) {
    if ((docs[i].categoryKey || '').toLowerCase() === catKey.toLowerCase()) {
      return { name: docs[i].category, section: docs[i].section, sectionOrder: docs[i].sectionOrder };
    }
  }
  return null;
}

// 获取当前 channel 的所有分类列表（用于下拉选择）
function getCategoryOptions(currentCatKey) {
  var cats = [];
  var seen = {};
  var docs = appData.channels[activeChannel].documents;
  for (var i = 0; i < docs.length; i++) {
    var k = (docs[i].categoryKey || '').toLowerCase();
    if (!k || seen[k]) continue;
    seen[k] = true;
    var n = docs[i].category || k;
    cats.push({ key: k, name: n });
  }
  var html = '';
  for (var j = 0; j < cats.length; j++) {
    var selected = cats[j].key === currentCatKey ? ' selected' : '';
    html += '<option value="' + escapeHtml(cats[j].key) + '"' + selected + '>' + escapeHtml(cats[j].name) + '</option>';
  }
  return html;
}

// ---------- 增删分类 ----------
function showAddCategoryDialog() {
  var name = prompt('输入新分类名称：');
  if (!name || !name.trim()) return;
  var catKey = name.trim().replace(/\s+/g, '_').toLowerCase();
  alert('分类「' + name + '」已创建！\n现在可以在卡片上选择该分类来移动文档。');
  // 标记这个分类存在（后续保存时会处理）
  if (!appData._pendingCategories) appData._pendingCategories = [];
  appData._pendingCategories.push({ key: catKey, name: name.trim(), section: activeSection || '通用' });
  renderAll();
  setTimeout(bindDragEvents, 100);
}

// ---------- 保存到 GitHub ----------
function showSaveDialog() {
  document.getElementById('saveOverlay').classList.add('show');
}
function hideSaveDialog() {
  document.getElementById('saveOverlay').classList.remove('show');
}

function saveToGitHub() {
  hideSaveDialog();
  var statusEl = document.getElementById('toolbarStatus');
  
  var token = prompt('请输入 GitHub Token 以保存更改：', '');
  if (!token || !token.trim()) { statusEl.textContent = '❌ 已取消'; return; }
  
  statusEl.textContent = '⏳ 正在保存...';

  var repo = 'ss1016672393-prog/-';
  var path = 'doc-index/data.js';

  try {
    function btoaSafe(s) {
      var u8 = unescape(encodeURIComponent(s));
      var bin = '';
      for (var i = 0; i < u8.length; i++) bin += String.fromCharCode(u8.charCodeAt(i));
      return window.btoa(bin);
    }
    var dataStr = buildDataJsString();
    var contentB64 = btoaSafe(dataStr);

    // 先获取 SHA
    fetch('https://api.github.com/repos/' + repo + '/contents/' + path, {
      headers: { 'Authorization': 'token ' + token }
    }).then(function(r) { return r.json(); }).then(function(fileData) {
      var sha = fileData.sha;
      fetch('https://api.github.com/repos/' + repo + '/contents/' + path, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'update: 编辑模式调整分类和顺序',
          content: contentB64,
          sha: sha
        })
      }).then(function(r2) {
        if (r2.ok) {
          statusEl.textContent = '✅ 保存成功！';
          setTimeout(function() { toggleEditMode(); }, 1000);
        } else {
          r2.json().then(function(err) { statusEl.textContent = '❌ 保存失败: ' + (err.message || ''); });
        }
      }).catch(function(err) { statusEl.textContent = '❌ 网络错误: ' + err.message; });
    }).catch(function(err) { statusEl.textContent = '❌ 获取SHA失败: ' + err.message; });

  } catch(e) { statusEl.textContent = '❌ 错误: ' + e.message; }
}

// 将当前 appData 重新序列化为 data.js 字符串格式
function buildDataJsString() {
  // 简化版本：直接用 JSON 格式输出
  var channels = appData.channels;
  var lines = [
    '// CFH 设计中心索引数据 | 多职能通道格式',
    '// 更新时间: ' + new Date().toLocaleString('zh-CN'),
    '',
    'var DOC_DATA = {',
    '  "channels": {'
  ];
  Object.keys(channels).forEach(function(chKey) {
    var ch = channels[chKey];
    lines.push('    "' + chKey + '": {');
    lines.push('      "title": ' + JSON.stringify(ch.title) + ',');
    lines.push('      "subtitle": ' + JSON.stringify(ch.subtitle || '') + ',');
    lines.push('      "updatedAt": ' + JSON.stringify(ch.updatedAt || '') + ',');
    lines.push('      "totalDocuments": ' + (ch.documents || []).length + ',');
    // sections/categories 简化输出
    lines.push('      "sections": [],');
    lines.push('      "categories": [],');
    lines.push('      "documents": [');
    var docs = ch.documents || [];
    docs.forEach(function(d, di) {
      var docJson = JSON.stringify(d, null, 6);
      docJson = docJson.replace(/\n/g, '\n        ');
      var comma = di < docs.length - 1 ? ',' : '';
      lines.push('        ' + docJson + comma);
    });
    lines.push('      ]');
    lines.push('    }' + (Object.keys(channels).indexOf(chKey) < Object.keys(channels).length - 1 ? ',' : ''));
  });
  lines.push('  }');
  lines.push('};');
  return lines.join('\n');
}

// ========== 工具函数 ==========

function setFilter(btn, category) {
  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  activeCategory = category;
  renderAll();
}

function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML =
    '<div class="no-results"><div class="no-results-icon">⚠️</div><p>' + msg + '</p></div>';
}

// 快捷键: / 聚焦搜索框
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});
