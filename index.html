<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">📋 文档索引</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-hover: #242c38;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --status-design: #f0883e;
    --status-review: #d29922;
    --status-done: #3fb950;
    --status-paused: #8957e5;
    --tag-bg: rgba(88,166,255,0.12);
    --tag-text: #58a6ff;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* 居中容器 */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ===== Header ===== */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 20px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header .container {
    display: block;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap; gap: 12px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #a259ff, #f24e1e, #ff7262);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--text-secondary); }

  /* Search */
  .search-bar { position: relative; max-width: 460px; width: 100%; }
  .search-input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px;
  }

  /* Stats */
  .stats-row {
    display: flex; gap: 16px; padding: 20px 0; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    min-width: 120px;
  }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 13px; color: var(--text-secondary); }

  /* Filter Tabs */
  .filter-section {
    padding: 0 0 16px;
    display: flex; flex-direction: column; gap: 0;
  }
  .filter-label { font-size: 13px; color: var(--text-secondary); margin-right: 4px; }
  .filter-tab {
    padding: 5px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text-secondary);
    transition: all 0.15s;
  }
  .filter-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
  .filter-tab.active {
    background: var(--tag-bg); color: var(--tag-text);
    border-color: rgba(88,166,255,0.25);
  }
  /* 板块按钮稍微大一点，区分层级 */
  .section-tab { font-weight: 600; padding: 6px 18px; }
  .cat-tab { font-size: 12px; }

  /* 两行筛选垂直堆叠 */
  .filter-row-section {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
  }
  .filter-row-cat {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    min-height: 36px;
  }

  /* Main Content */
  .main { padding: 0 0 60px; }

  /* Section Group (板块分组) */
  .section-group { margin-bottom: 56px; }
  .section-title {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  
  /* Category Section */
  .category-section { margin-bottom: 32px; }
  .category-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-left: 12px;
    border-left: 3px solid var(--accent);
  }
  .category-count {
    font-size: 13px; color: var(--text-muted);
    background: var(--bg-card); padding: 2px 10px; border-radius: 10px;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* Doc Card */
  .doc-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none; color: inherit;
    display: block; position: relative;
  }
  .doc-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  /* 新文档角标 */
  .new-badge {
    display: inline-block; margin-left: 6px;
    background: linear-gradient(135deg, #f0883e, #ff6b35);
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 1px 7px; border-radius: 8px;
    line-height: 1.4; vertical-align: middle;
    animation: pulse-badge 2s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  /* 已访问效果 */
  .doc-card.visited {
    opacity: 0.55;
  }
  .doc-card.visited:hover {
    opacity: 0.85;
  }
  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .figma-icon { color: #a259ff; font-size: 15px; }
  .card-status {
    font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500;
    white-space: nowrap;
  }
  .status-designing { background: rgba(240,136,62,0.15); color: var(--status-design); }
  .status-review   { background: rgba(210,153,34,0.15); color: var(--status-review); }
  .status-done     { background: rgba(63,185,80,0.15); color: var(--status-done); }
  .status-paused   { background: rgba(137,87,229,0.15); color: var(--status-paused); }

  .card-desc {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .card-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--tag-bg); color: var(--tag-text);
  }
  .card-tag.phase { background: rgba(137,87,229,0.12); color: #a371f7; }

  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-muted);
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
  }
  .card-owner { display: flex; align-items: center; gap: 6px; }
  .avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: white; font-weight: 600;
  }

  /* Footer */
  .footer {
    text-align: center; padding: 30px;
    color: var(--text-muted); font-size: 12px;
    border-top: 1px solid var(--border-color); margin-top: 40px;
  }

  /* No Results */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .no-results-icon { font-size: 48px; margin-bottom: 12px; }

  /* Loading */
  .loading {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
    font-size: 15px;
  }
  .loading-spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .doc-card { animation: fadeIn 0.3s ease-out forwards; }

  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    .header { padding: 16px 0; }
    .stats-row { padding: 16px 0; }
    .filter-section { padding: 0 0 12px; }
    .main { padding: 0 0 40px; }
    .card-grid { grid-template-columns: 1fr; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="container">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div>
        <div class="logo-text" id="logoTitle">文档索引</div>
        <div class="logo-sub" id="logoSub">Figma Design System Index</div>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput"
             placeholder="搜索文档名称、标签或负责人..." oninput="renderAll()">
    </div>
  </div>
  </div>
  </div>
</header>

<!-- Stats -->
<div class="stats-row container" id="statsRow"></div>

<!-- Filters -->
<div class="filter-section container" id="filterSection"></div>

<!-- Main Content -->
<main class="main container" id="mainContent">
  <div class="loading"><span class="loading-spinner"></span>正在加载文档数据...</div>
</main>

<!-- Footer -->
<footer class="footer">
  <p id="footerText">📋 文档索引 · 最后更新中...</p>
</footer>

<script src="data.js"></script>
<script>
/**
 * ============================================================
 * 📋 Figma 文档索引 - 渲染引擎
 * ============================================================
 * 从 data.js 读取数据，动态渲染整个页面
 * 支持搜索、分类筛选、统计
 */

var activeCategory = 'all';
var activeSection = 'all';  // 板块筛选: all / 通用 / 局外 / 局内 / 主机相关
var activeStatus = 'all';   // 状态筛选: all / designing / review / done
var newDocSet = null;       // 随机标记"新"的文档 URL 集合
var appData = null;

// ========== 初始化 ==========
(function init() {
  try {
    if (typeof DOC_DATA === 'undefined' && typeof INDEX_DATA === 'undefined') {
      showError('⚠️ 数据文件加载失败，请确认 data.js 存在');
      return;
    }
    appData = typeof DOC_DATA !== 'undefined' ? DOC_DATA : INDEX_DATA;

    // 随机选 6-8 个文档标记为"新"（基于文档 URL 哈希，同一次会话固定）
    var docs = appData.documents || [];
    var urls = docs.map(function(d) { return d.url || d.name; });
    var shuffled = urls.slice().sort(function() { return Math.random() - 0.5; });
    var pickCount = Math.min(Math.max(6, Math.floor(docs.length * 0.1)), 8);
    newDocSet = {};
    for (var i = 0; i < pickCount && i < shuffled.length; i++) {
      newDocSet[shuffled[i]] = true;
    }

    renderAll();
  } catch(e) {
    showError('❌ 页面初始化失败: ' + e.message);
  }
})();

// ========== 主渲染函数 ==========
function renderAll() {
  if (!appData) return;

  // 更新全局信息
  document.getElementById('pageTitle').textContent = appData.title || '📋 文档索引';
  document.getElementById('logoTitle').textContent = appData.title || '文档索引';
  document.getElementById('logoSub').textContent = appData.subtitle || '';
  document.getElementById('footerText').innerHTML =
    '🎮 ' + (appData.title || '文档索引') +
    ' · 基于 Figma 构建 · 最后更新 ' + (appData.lastUpdated || new Date().toLocaleDateString('zh-CN'));

  const docs = appData.documents || [];
  const keyword = document.getElementById('searchInput').value.toLowerCase().trim();

  // 按分类分组
  var grouped = {};
  for (var i = 0; i < docs.length; i++) {
    var d = docs[i];
    var catKey = (d.categoryKey || 'other').toLowerCase();
    if (!grouped[catKey]) grouped[catKey] = [];
    grouped[catKey].push(d);
  }

  // 筛选（支持板块 + 分类两级筛选）
  var filteredDocs = [];
  var filteredGrouped = {};
  Object.keys(grouped).forEach(function(catKey) {
    var catDocs = grouped[catKey];
    var firstDoc = Array.isArray(catDocs) ? catDocs[0] : (catDocs.docs && catDocs.docs.length ? catDocs.docs[0] : null);
    if (!firstDoc) return;
    var docSec = (firstDoc.section || '其他');

    // 板块过滤
    if (activeSection !== 'all' && docSec !== activeSection) return;

    var matched = (Array.isArray(catDocs) ? catDocs : (catDocs.docs || [])).filter(function(d) {
      if (activeCategory !== 'all' && (d.categoryKey || 'other').toLowerCase() !== activeCategory) return false;
      if (activeStatus !== 'all') {
        var docStatus = (d.status || 'unknown').toLowerCase();
        if (activeStatus === 'designing' && docStatus !== 'designing') return false;
        if (activeStatus === 'review' && docStatus !== 'review') return false;
        if (activeStatus === 'done' && docStatus !== 'done') return false;
      }
      if (keyword) {
        var haystack = (d.name || '') + ' ' + (d.tags || []).join(' ') + ' ' + (d.owner || '') + ' ' + (d.desc || '');
        if (haystack.toLowerCase().indexOf(keyword) === -1) return false;
      }
      return true;
    });
    if (matched.length > 0) {
      filteredGrouped[catKey] = { category: matched[0].category || catKey, docs: matched };
      filteredDocs = filteredDocs.concat(matched);
    }
  });

  // 渲染各部分
  renderStats(filteredDocs);
  renderFilters(grouped);
  renderContent(filteredGrouped, filteredDocs.length === 0 && keyword);
}

// ========== 统计栏 ==========
function renderStats(docs) {
  var total = docs.length;
  var s = { designing: 0, review: 0, done: 0, paused: 0 };
  for (var i = 0; i < docs.length; i++) {
    var st = (docs[i].status || 'unknown').toLowerCase();
    if (s.hasOwnProperty(st)) s[st]++;
  }

  var html =
    '<div class="stat-card" onclick="filterByStatus(\'all\')" style="cursor:pointer;">' +
      '<span style="color:#58a6ff;font-weight:700;font-size:20px;">📄</span>' +
      '<div><div class="stat-num">' + total + '</div><div class="stat-label">交互文档</div></div>' +
    '</div>' +
    '<div class="stat-card" onclick="filterByStatus(\'designing\')" style="cursor:pointer;">' +
      '<span style="color:#f0883e;font-weight:700;font-size:20px;">✏️</span>' +
      '<div><div class="stat-num">' + s.designing + '</div><div class="stat-label">新建文档</div></div>' +
    '</div>' +
    '<div class="stat-card" onclick="filterByStatus(\'review\')" style="cursor:pointer;">' +
      '<span style="color:#d29922;font-weight:700;font-size:20px;">👀</span>' +
      '<div><div class="stat-num">' + s.review + '</div><div class="stat-label">设计中</div></div>' +
    '</div>' +
    '<div class="stat-card" onclick="filterByStatus(\'done\')" style="cursor:pointer;">' +
      '<span style="color:#3fb950;font-weight:700;font-size:20px;">✅</span>' +
      '<div><div class="stat-num">' + s.done + '</div><div class="stat-label">已定稿</div></div>' +
    '</div>';

  document.getElementById('statsRow').innerHTML = html;
}

// ========== 分类筛选标签（板块 + 子分类两层）==========
function renderFilters(grouped) {
  // 按 section 分组统计
  var sections = {};   // { "通用": { total: N, cats: [{key, name, count}] }, ... }

  Object.keys(grouped).forEach(function(catKey) {
    var catInfo = grouped[catKey];
    var doc = Array.isArray(catInfo) ? catInfo[0] : (catInfo.docs && catInfo.docs.length ? catInfo.docs[0] : null);
    if (!doc) return;
    var sec = doc.section || '其他';
    var catName = catInfo.category || doc.category || catKey;
    var count = Array.isArray(catInfo) ? catInfo.length : (catInfo.docs ? catInfo.docs.length : 0);

    if (!sections[sec]) sections[sec] = { total: 0, cats: [] };
    sections[sec].total += count;
    sections[sec].cats.push({ key: catKey, name: catName, count: count, sectionOrder: doc.sectionOrder || 99 });
  });

  var sectionOrder = ['局外', '局内', '主机相关', '通用'];
  var sortedSections = Object.keys(sections).sort(function(a, b) {
    var ai = sectionOrder.indexOf(a), bi = sectionOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  // ===== 第一行：四大板块按钮 =====
  var sectionHtml = '<button class="filter-tab section-tab' + (activeSection === 'all' ? ' active' : '') +
                 '" onclick="setSection(this, \'all\')">📋 全部</button>';

  for (var si = 0; si < sortedSections.length; si++) {
    var secName = sortedSections[si];
    var secData = sections[secName];
    // 计算该板块下可见的子分类数量（考虑当前分类筛选）
    var visibleCatCount = 0;
    for (var ci = 0; ci < secData.cats.length; ci++) {
      if (activeCategory === 'all' || activeCategory === secData.cats[ci].key) visibleCatCount++;
    }
    sectionHtml += '<button class="filter-tab section-tab' + (activeSection === secName ? ' active' : '') +
                   '" onclick="setSection(this, \'' + escapeHtml(secName) + '\')">' +
                   '📂 ' + escapeHtml(secName) + ' (' + secData.total + ')</button>';
  }

  // ===== 第二行：子分类标签（只显示当前选中板块下的）=====
  var categoryHtml = '';
  categoryHtml += '<button class="filter-tab cat-tab' + (activeCategory === 'all' ? ' active' : '') + '" onclick="setFilter(this, \'all\')">全部</button>';

  var showCats = (activeSection === 'all')
    ? sortedSections.map(function(s) { return sections[s].cats; }).reduce(function(a, b) { return a.concat(b); }, [])
    : (sections[activeSection] ? sections[activeSection].cats : []);

  // 排序子分类
  showCats.sort(function(a, b) { return (a.sectionOrder || 0) - (b.sectionOrder || 0); });
  for (var i = 0; i < showCats.length; i++) {
    var c = showCats[i];
    categoryHtml += '<button class="filter-tab cat-tab' + (activeCategory === c.key ? ' active' : '') +
                    '" onclick="setFilter(this,\'' + c.key + '\')">📦 ' + c.name + ' (' + c.count + ')</button>';
  }

  document.getElementById('filterSection').innerHTML =
    '<div class="filter-row-section">' + sectionHtml + '</div>' +
    '<div class="filter-row-cat">' + categoryHtml + '</div>';
}

// 设置板块筛选
function setSection(btn, section) {
  document.querySelectorAll('.section-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  activeSection = section;
  activeCategory = 'all';  // 切换板块时重置子分类
  renderAll();
}

// 设置状态筛选（点击统计卡）
function filterByStatus(status) {
  // 高亮选中的统计卡
  document.querySelectorAll('.stat-card').forEach(function(c) { c.style.opacity = '0.5'; });
  event.currentTarget.style.opacity = '1';
  activeStatus = status;
  renderAll();
}

// ========== 内容区域（按板块分组渲染）==========
function renderContent(grouped, showNoResults) {
  var container = document.getElementById('mainContent');

  if (showNoResults) {
    container.innerHTML =
      '<div class="no-results">' +
        '<div class="no-results-icon">🔍</div>' +
        '<p>没有找到匹配的文档</p>' +
        '<p style="font-size:13px;margin-top:4px;color:var(--text-muted);">试试其他关键词</p>' +
      '</div>';
    return;
  }

  // 按 section 分组
  // grouped 结构: { catKey: { category, docs } }
  var sections = {};
  Object.keys(grouped).forEach(function(catKey) {
    var catInfo = grouped[catKey];
    if (!catInfo || !catInfo.docs) return;
    var doc = catInfo.docs.length ? catInfo.docs[0] : null;
    if (!doc) return;
    var sec = doc.section || '其他';
    if (!sections[sec]) sections[sec] = { docs: {}, order: doc.sectionOrder || 99 };
    sections[sec].docs[catKey] = catInfo;
  });

  var sectionOrder = ['局外', '局内', '主机相关', '通用'];
  var sortedSecs = Object.keys(sections).sort(function(a, b) {
    var ai = sectionOrder.indexOf(a), bi = sectionOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  var html = '';

  for (var si = 0; si < sortedSecs.length; si++) {
    var secName = sortedSecs[si];
    var secData = sections[secName];

    // 板块标题行
    html += '<section class="section-group">';
    html += '<h2 class="section-title">' + escapeHtml(secName) + '</h2>';

    // 该板块下的各分类
    var catKeys = Object.keys(secData.docs).sort();
    for (var ci = 0; ci < catKeys.length; ci++) {
      var catKey = catKeys[ci];
      var catInfo = grouped[catKey];
      var catName = catInfo.category || catKey;
      var catDocs = catInfo.docs;

      html += '<div class="category-section" data-category="' + catKey + '">' +
        '<div class="category-header">' +
          '<span class="category-title">' + escapeHtml(catName) + '</span>' +
          '<span class="category-count">' + catDocs.length + '</span>' +
        '</div>' +
        '<div class="card-grid">';

      for (var di = 0; di < catDocs.length; di++) {
        html += renderCard(catDocs[di], di);
      }

      html += '</div></div>';
    }
    html += '</section>'; // end section-group
  }

  container.innerHTML = html;
}

// ========== 单个卡片 ==========
function renderCard(doc, index) {
  var statusInfo = getStatusInfo(doc.status);
  var isNew = newDocSet && !!(newDocSet[doc.url] || newDocSet[doc.name]);
  var newBadge = isNew ? '<span class="new-badge">新</span>' : '';
  var ownerHtml = doc.owner
    ? '<div class="card-owner"><div class="avatar" style="' + getAvatarColor(doc.owner) + '">' + doc.owner.charAt(0) + '</div> ' + escapeHtml(doc.owner) + '</div>'
    : '<div class="card-owner"></div>';
  var updatedHtml = doc.updatedAt ? '<span>更新于 ' + doc.updatedAt + '</span>' : '';

  // 检查是否已点击
  var visitedKey = 'visited_' + (doc.url || doc.name);
  var isVisited = localStorage.getItem(visitedKey) === '1';
  var visitedCls = isVisited ? ' visited' : '';

  var tagsHtml = '';
  if (doc.tags && doc.tags.length > 0) {
    tagsHtml = '<div class="card-tags">';
    for (var ti = 0; ti < doc.tags.length; ti++) {
      var tag = doc.tags[ti];
      var isPhase = /^v?\d/.test(tag);
      tagsHtml += '<span class="card-tag' + (isPhase ? ' phase' : '') + '">' + escapeHtml(tag) + '</span>';
    }
    tagsHtml += '</div>';
  } else {
    tagsHtml = '<div class="card-tags"></div>';
  }

  return '<a class="doc-card' + visitedCls + '" href="' + escapeHtml(doc.url || '#') + '" target="_blank" rel="noopener"' +
    ' style="animation-delay:' + (index * 0.03) + 's"' +
    ' data-visit-key="' + escapeHtml(visitedKey) + '"' +
    ' onclick="markVisited(this)">' +
    '<div class="card-top">' +
      '<span class="card-title"><span class="figma-icon">◉</span> ' + escapeHtml(doc.name) + newBadge + '</span>' +
      '<span class="card-status ' + statusInfo.cls + '">' + statusInfo.label + '</span>' +
    '</div>' +
    '<div class="card-desc">' + escapeHtml(doc.desc || '') + '</div>' +
    tagsHtml +
    '<div class="card-meta">' + ownerHtml + updatedHtml + '</div>' +
  '</a>';
}

// 标记为已访问
function markVisited(el) {
  var key = el.getAttribute('data-visit-key');
  if (key) localStorage.setItem(key, '1');
}

// ========== 工具函数 ==========
function setFilter(btn, category) {
  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  activeCategory = category;
  renderAll();
}

function getStatusInfo(status) {
  var map = {
    designing: { label: '新建', cls: 'status-designing' },
    review:   { label: '设计中', cls: 'status-review' },
    done:     { label: '已定稿', cls: 'status-done' },
    paused:   { label: '暂缓',   cls: 'status-paused' },
  };
  return map[(status || '').toLowerCase()] || { label: '', cls: '' };
}

function getAvatarColor(name) {
  var colors = [
    'background:linear-gradient(135deg,#667eea,#764ba2)',
    'background:linear-gradient(135deg,#f093fb,#f5576c)',
    'background:linear-gradient(135deg,#4facfe,#00f2fe)',
    'background:linear-gradient(135deg,#fa709a,#fee140)',
    'background:linear-gradient(135deg,#a8edea,#fed6e3)',
    'background:linear-gradient(135deg,#d299c2,#fef9d7)',
  ];
  var hash = 0;
  for (var i = 0; i < (name || '').length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML =
    '<div class="no-results"><div class="no-results-icon">⚠️</div><p>' + msg + '</p></div>';
}

// 快捷键: / 聚焦搜索框
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});
</script>
