name: Sync Figma Data

on:
  schedule:
    # [测试] 临时改为 UTC 08:02 = 北京时间 16:02，测完改回 '0 2 * * *'
    - cron: '2 8 * * *'
  workflow_dispatch: # 也支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth:0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: List files (debug)
        run: ls -la doc-index/ && echo "---" && ls -la .github/workflows/

      - name: Run sync.py
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          cd doc-index && python sync.py --token "$FIGMA_TOKEN"

      - name: Commit & Push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc-index/data.js
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto-sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
